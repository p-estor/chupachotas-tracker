    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('chupachotas-theme');
          if (savedTheme === 'pro') {
            document.documentElement.setAttribute('data-theme', 'pro');
          }
        } catch (e) {}
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
